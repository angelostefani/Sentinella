services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant}
      TZ: ${TZ:-Europe/Rome}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assistant} -d ${POSTGRES_DB:-assistant}"]
      interval: 10s
      timeout: 5s
      retries: 10

  searxng_redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    environment:
      - BASE_URL=http://localhost:8001/searxng/
      - INSTANCE_NAME=sentinella-searxng
      - SEARXNG_REDIS_URL=redis://searxng_redis:6379/0
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    depends_on:
      searxng_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/search?q=test&format=json >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 8s
      retries: 20

  ollama_init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "OLLAMA_HOST=ollama:11434 ollama pull ${OLLAMA_MODEL}"
    restart: "no"

  api:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Europe/Rome}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://assistant:assistant@postgres:5432/assistant}
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Europe/Rome}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://assistant:assistant@postgres:5432/assistant}
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker_healthy"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend_build:
    build:
      context: ./frontend
    command: ["sh", "-c", "npm install && npm run build && cp -r dist/* /dist/"]
    volumes:
      - frontend_dist:/dist
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
      frontend_build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  ollama:
  frontend_dist:
